apiVersion: v1
kind: ServiceAccount
metadata:
  name: solodev-admin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: solodev-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: solodev-admin
  namespace: kube-system
---
# This manifest is applied via NetworkStack's Solodev custom resource, which
# runs before DashboardStack creates the kubernetes-dashboard namespace via
# Helm - the namespace must be created here first or the ServiceAccount
# below fails with "namespaces \"kubernetes-dashboard\" not found".
apiVersion: v1
kind: Namespace
metadata:
  name: kubernetes-dashboard
---
# Lets the dashboard's api service authenticate to the k8s API as itself (a
# fixed, low-privilege identity) but act on behalf of the Keycloak-SSO'd
# end user via Impersonate-User/Impersonate-Group headers - the actual
# native Kubernetes mechanism for this, since EKS's managed control plane
# doesn't support trusting an arbitrary external OIDC provider directly.
# Binds to "kubernetes-dashboard-api", the ServiceAccount the Helm chart
# itself creates for the api Deployment (release name is always fixed to
# "kubernetes-dashboard" - see webstack-dashboard.template.yaml) - not a
# separately-created ServiceAccount, since the pod won't use one anyway.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-impersonator
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-impersonator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard-impersonator
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-api
    namespace: kubernetes-dashboard
---
# What an impersonated "view"/"edit"/"admin" group is actually allowed to do,
# using Kubernetes' own built-in user-facing ClusterRoles (shipped by default
# on every cluster) rather than hand-rolled ones. The group name here must
# exactly match the Impersonate-Group value the auth service sets, which in
# turn matches the Keycloak client role name (see KeycloakService::ROLE_*)
# and Cloud's ClusterMember::getKubernetesRole() mapping.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sso-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: view
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sso-edit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: Group
    name: edit
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sso-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: admin
    apiGroup: rbac.authorization.k8s.io