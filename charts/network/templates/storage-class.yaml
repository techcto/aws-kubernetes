apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebscsi
  annotations:
    # Charts that create a PVC without an explicit storageClassName (e.g.
    # Solodev CMS's "client" volume) rely on the cluster having a default -
    # without this, those PVCs sit in Pending forever with "no persistent
    # volumes available for this claim and no storage class is set", which
    # looks identical to a slow/stuck install until you check `describe pvc`.
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  fsType: ext4
  type: gp2
---
apiVersion: storage.k8s.io/v1 
kind: StorageClass
metadata:
  name: ebscsix
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  fsType: xfs
  type: gp2