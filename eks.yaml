AWSTemplateFormatVersion: "2010-09-09"
Description: Deploys a Solodev Optimized EKS cluster into an existing VPC
Metadata:
  QSLint:
    Exclusions: [W3002, W3001, W1010]
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network configuration
        Parameters:
          - VPCID
          - PrivateSubnet1ID
          - PrivateSubnet2ID
          - PrivateSubnet3ID
          - PublicSubnet1ID
          - PublicSubnet2ID
          - PublicSubnet3ID
      - Label:
          default: Amazon EC2 configuration
        Parameters:
          - KeyPairName
      - Label:
          default: Amazon EKS configuration
        Parameters:
          - NodeInstanceType
          - NumberOfNodes
          - NodeGroupName
          - NodeVolumeSize
          - ManagedNodeGroup
          - KubernetesVersion
    ParameterLabels:
      KeyPairName:
        default: SSH key name
      NodeInstanceType:
        default: Nodes instance type
      NumberOfNodes:
        default: Number of nodes
      NodeGroupName:
        default: Node group name
      NodeVolumeSize:
        default: Node volume size
      ManagedNodeGroup:
        default: Managed Node Group
      PublicSubnet1ID:
        default: Public subnet 1 ID
      PublicSubnet2ID:
        default: Public subnet 2 ID
      PublicSubnet3ID:
        default: Public subnet 3 ID
      PrivateSubnet1ID:
        default: Private subnet 1 ID
      PrivateSubnet2ID:
        default: Private subnet 2 ID
      PrivateSubnet3ID:
        default: Private subnet 3 ID
      VPCID:
        default: VPC ID
      HttpProxy:
        default: HTTP proxy
Parameters:
  KeyPairName:
    Description: Name of an existing key pair, which allows you
      to securely connect to your instance after it launches.
    Type: String
    Default: ""
  NodeInstanceType:
    Default: t3.medium
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - m5.4xlarge
      - m5.12xlarge
      - m5.24xlarge
      - c5.large
      - c5.xlarge
      - c5.2xlarge
      - c5.4xlarge
      - c5.9xlarge
      - c5.18xlarge
      - i3.large
      - i3.xlarge
      - i3.2xlarge
      - i3.4xlarge
      - i3.8xlarge
      - i3.16xlarge
      - x1.16xlarge
      - x1.32xlarge
      - p3.2xlarge
      - p3.8xlarge
      - p3.16xlarge
      - r5.large
      - r5.xlarge
      - r5.2xlarge
      - r5.4xlarge
      - r5.12xlarge
      - r5.24xlarge
      - r5d.large
      - r5d.xlarge
      - r5d.2xlarge
      - r5d.4xlarge
      - r5d.12xlarge
      - r5d.24xlarge
      - z1d.large
      - z1d.xlarge
      - z1d.2xlarge
      - z1d.3xlarge
      - z1d.6xlarge
      - z1d.12xlarge
    ConstraintDescription: Must be a valid EC2 instance type
    Description: The type of EC2 instance for the node instances.
    Type: String
  NumberOfNodes:
    Default: 3
    Description: The number of Amazon EKS node instances. The default is one for each of the three Availability Zones.
    Type: Number
  MaxNumberOfNodes:
    Default: 3
    Description: Maximum number of Amazon EKS node instances. The default is three.
    Type: Number
  NodeGroupName:
    Default: Default
    Description: The name for EKS node group.
    Type: String
  NodeInstanceFamily:
    AllowedValues: ['Standard', 'ARM', 'GPU']
    Type: String
    Description: Choose the instance family to match the value of "Node instance type."
    Default: Standard
  NodeGroupType:
    Type: String
    AllowedValues: [ Managed, Unmanaged ]
    Default: Managed
    Description: Choose "Unmanaged" to create an Auto Scaling group without using the EKS-managed node groups feature.
  NodeGroupOS:
    AllowedValues:
      - 'Amazon Linux 2023'
      - 'Bottlerocket'
      - 'Windows'
    Default: 'Amazon Linux 2023'
    Description: Operating system to use for node instances. Amazon Linux 2 is not offered -
      AWS ended EKS-optimized AL2 AMI support on 2025-11-26 and AL2 itself reached end of
      life on 2026-06-30.
    Type: String
  NodeVolumeSize:
    Default: 20
    Description: "The size for the node's root EBS volumes."
    Type: String
  ManagedNodeGroup:
    Type: String
    Default: 'Yes'
    AllowedValues: ['Yes', 'No']
    Description: If 'No' the stack will create just the Security Group skipping the node group. This is useful if you manage the node group with third party integration, such as Spot.io
  CustomNodeRole:
    Type: String
    Default: ""
  VPCID:
    Type: "AWS::EC2::VPC::Id"
    Description: The ID of your existing VPC (e.g., vpc-0343606e)
  PublicSubnet1ID:
    Type: String
    Description: The ID of the public subnet in Availability Zone 1 in your existing VPC (e.g., subnet-a0246dcd)
    Default: ""
  PublicSubnet2ID:
    Type: String
    Description: The ID of the public subnet in Availability Zone 2 in your existing VPC (e.g., subnet-b1236eea)
    Default: ""
  PublicSubnet3ID:
    Type: String
    Description: The ID of the public subnet in Availability Zone 3 in your existing VPC (e.g., subnet-c3456aba)
    Default: ""
  PrivateSubnet1ID:
    Type: "AWS::EC2::Subnet::Id"
    Description: The ID of the private subnet in Availability Zone 1 in your existing VPC (e.g., subnet-fe9a8b32)
  PrivateSubnet2ID:
    Type: String
    Description: The ID of the private subnet in Availability Zone 2 in your existing VPC (e.g., subnet-be8b01ea)
    Default: ""
  PrivateSubnet3ID:
    Type: String
    Description: The ID of the private subnet in Availability Zone 3 in your existing VPC (e.g., subnet-abd39039)
    Default: ""
  KubernetesVersion:
    Type: String
    AllowedValues: ['1.36', '1.35', '1.34', '1.33', '1.32', '1.31']
    Default: '1.36'
  BastionRole:
    Type: String
    Default: ""
  EKSPublicAccessCIDRs:
    Type: List<String>
    Default: 0.0.0.0/0
  EKSPublicAccessEndpoint:
    Type: String
    AllowedValues: [Enabled, Disabled]
    Default: Disabled
  EKSPrivateAccessEndpoint:
    Type: String
    AllowedValues: [Enabled, Disabled]
    Default: Enabled
  EKSClusterLoggingTypes:
    Type: String
    AllowedValues: [Enabled, Disabled]
    Default: Disabled
    Description: Choose Enabled to send api, audit, authenticator, controllerManager, and scheduler logs to CloudWatch Logs.
  NodeBootstrapExtraArgs:
    Type: String
    Default: ""
    Description: >-
      A single extra kubelet flag applied to each node via the nodeadm NodeConfig, e.g.
      --max-pods=110 to raise pod density above the ENI-based default.
  EKSEncryptSecrets:
    Type: String
    AllowedValues: [Enabled, Disabled]
    Default: Enabled
  EKSEncryptSecretsKmsKeyArn:
    Type: String
    Default: ""
  AdditionalEKSAdminUserArn:
    Type: String
    Default: ""
  AdditionalEKSAdminRoleArn:
    Type: String
    Default: ""
  IamOidcProvider:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
  ProvisionWeave:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Weave CNI"
  LambdaBucketName:
    AllowedPattern: ^[0-9a-zA-Z]+([0-9a-zA-Z-]*[0-9a-zA-Z])*$
    Default: solodev-kubernetes
    Type: String
  KeyPrefix:
    Default: cloudformation/
    Type: String
  CustomAmiId:
    Type: String
    Default: "ami-0d6c8b2a8562eba37"
    Description: "(Optional) If an AMI ID is specified: https://docs.aws.amazon.com/eks/latest/userguide/retrieve-ami-id.html"
  AdminEmail:
    Type: String
    Default: ""
    Description: "What is your email address?"
  ProvisionLoadBalancerController:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
  ProvisionNginxIngress:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Inginx Proxy"
  ProvisionExternalDNS:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable External DNS with Route 53"
  ProvisionDashboard:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Dashboard"
  ProvisionNetwork:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Token"
  HttpProxy:
    Type: String
    Default: ""
  
  CloudOIDCUrl:
    Type: String
    Description: "Cloud's own OIDC issuer URL, for SSO login into the Dashboard - not to be confused with the EKS cluster's own OIDC provider (used for IRSA), which is a different thing entirely"
    Default: ""

  CloudClientId:
    Type: String
    Description: "Cloud's Keycloak client id for this cluster (not Cognito - Cloud's SSO identity provider is Keycloak)"
    Default: ""

  CloudClientSecret:
    Type: String
    Description: "Cloud's Keycloak client secret for this cluster"
    Default: ""

  CloudScope:
    Type: String
    Default: 'openid profile email'

  SessionSigningKey:
    Type: String
    Description: "Key used to sign/verify the SSO session token exchanged between the Dashboard's auth and api services. Must be set to a real random value for SSO to work."
    Default: ""
    NoEcho: true

  ClusterZone:
    Description: This is the DNS Zone that for a single cluster
    Type: String
    Default: ""

Mappings:
  # Second-level keys must be alphanumeric (CloudFormation rejects spaces in
  # Mappings attribute names) - NodeGroupOS's actual values ('Amazon Linux 2023',
  # etc.) are translated to these via Conditions at the point of use.
  AmiTypeMap:
    Standard:
      AmazonLinux2023: AL2023_x86_64_STANDARD
      Bottlerocket: BOTTLEROCKET_x86_64
      Windows: WINDOWS_CORE_2019_x86_64
    ARM:
      AmazonLinux2023: AL2023_ARM_64_STANDARD
      Bottlerocket: BOTTLEROCKET_ARM_64
      Windows: WINDOWS_CORE_2019_x86_64
    GPU:
      AmazonLinux2023: AL2023_x86_64_NVIDIA
      Bottlerocket: BOTTLEROCKET_x86_64_NVIDIA
      Windows: WINDOWS_CORE_2019_x86_64

Conditions:
  BastionRole: !Not [ !Equals [ !Ref BastionRole, "" ] ]
  UseKeyPair: !Not [ !Equals [ !Ref KeyPairName, "" ] ]
  EnablePublicSubnets: !Not [!Equals [!Ref PublicSubnet1ID, ""]]
  EnablePrivateEndpoint: !Equals [ !Ref EKSPrivateAccessEndpoint, "Enabled" ]
  EnablePublicEndpoint: !Equals [ !Ref EKSPublicAccessEndpoint, "Enabled" ]
  EnableLoadBalancerController: !Equals [!Ref 'ProvisionLoadBalancerController', 'Enabled']
  CustomeNodeRoleProvided: !Not [ !Equals [ !Ref CustomNodeRole, "" ] ]
  NoCustomNodeRoleProvided: !Equals [ !Ref CustomNodeRole, "" ]
  CreateKey: !And
    - !Equals [ !Ref EKSEncryptSecretsKmsKeyArn, "" ]
    - !Equals [ !Ref EKSEncryptSecrets, Enabled ]
  EnableEncryption: !Equals [ !Ref EKSEncryptSecrets, Enabled ]
  LoggingEnabled: !Equals [ !Ref EKSClusterLoggingTypes, Enabled ]
  EnableIamOidcProvider: !Equals [!Ref 'IamOidcProvider', 'Enabled']
  CreateNodeGroup: !Equals [ !Ref ManagedNodeGroup, 'Yes' ]
  HasNodeBootstrapExtraArgs: !Not [ !Equals [ !Ref NodeBootstrapExtraArgs, "" ] ]
  WindowsOS: !Equals [ !Ref NodeGroupOS, 'Windows' ]
  BottlerocketOS: !Equals [ !Ref NodeGroupOS, 'Bottlerocket' ]
  3AZDeployment: !Not [!Equals [!Ref PrivateSubnet3ID, ""]]
  2AZDeployment: !Or
    - !Not [!Equals [!Ref PrivateSubnet2ID, ""]]
    - !Not [!Equals [!Ref PrivateSubnet3ID, ""]]
  CustomAmi: !Equals [!Ref CustomAmiId, 'Enabled']
  AddUser: !Not [ !Equals [ !Ref AdditionalEKSAdminUserArn, "" ] ]
  AddRole: !Not [ !Equals [ !Ref AdditionalEKSAdminRoleArn, "" ] ]
  EnableNetwork: !Equals [!Ref 'ProvisionNetwork', 'Enabled']
  # Only actually install the Dashboard when SSO is configured - without a
  # Cognito client id, the oauth2-proxy deployment behind it has nothing to
  # authenticate against and is just a broken login screen.
  EnableDashboard: !And
    - !Equals [!Ref 'ProvisionDashboard', 'Enabled']
    - !Not [!Equals [!Ref 'CloudClientId', '']]
  NoProxy: !Equals [!Ref HttpProxy, '']

Resources:

  #============================================================================#
  # Controlplane Security
  #============================================================================#

  ControlPlaneSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cluster communication
      VpcId: !Ref VPCID
  ControlPlaneSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow SG members to access k8s api
      GroupId: !Ref ControlPlaneSecurityGroup
      SourceSecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
  KubernetesAdminRole:
    Type: "AWS::IAM::Role"
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [EIAMPolicyWildcardResource]
          ignore_reasons:
            EIAMPolicyWildcardResource: resources are created after stack is created by k8s/helm/eks resource types, and as such are unkown at role cretion time
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: eksStackPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - "eks:DescribeFargateProfile"
                  - "eks:ListTagsForResource"
                  - "eks:ListUpdates"
                  - "eks:DisassociateIdentityProviderConfig"
                  - "eks:DescribeCluster"
                  - "eks:CreateAddon"
                  - "eks:DeleteAddon"
                  - "eks:UntagResource"
                  - "eks:ListClusters"
                  - "eks:UpdateClusterVersion"
                  - "eks:AssociateEncryptionConfig"
                  - "eks:UpdateNodegroupConfig"
                  - "eks:DeleteCluster"
                  - "eks:DeleteFargateProfile"
                  - "eks:UpdateClusterConfig"
                  - "eks:DescribeAddonVersions"
                  - "eks:DescribeUpdate"
                  - "eks:CreateCluster"
                  - "eks:DescribeIdentityProviderConfig"
                  - "eks:ListAddons"
                  - "eks:DescribeAddon"
                  - "eks:UpdateNodegroupVersion"
                  - "eks:AccessKubernetesApi"
                  - "eks:AssociateIdentityProviderConfig"
                  - "eks:DeleteNodegroup"
                  - "eks:CreateFargateProfile"
                  - "eks:UpdateAddon"
                  - "eks:TagResource"
                  - "eks:ListNodegroups"
                  - "eks:ListIdentityProviderConfigs"
                  - "eks:CreateNodegroup"
                  - "eks:ListFargateProfiles"
                  - "eks:DescribeNodegroup"
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - lambda:InvokeFunction
                  - s3:GetObject
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource:
                  - "*"
              - Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:RemovePermission
                Resource:  "*"
              - Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource:  "*"

  #============================================================================#
  # Controlplane
  #============================================================================#
  
  KMSKey:
    Condition: CreateKey
    Type: "AWS::KMS::Key"
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [EIAMPolicyActionWildcard, EKMSKeyEnableKeyRotation]
          ignore_reasons:
            EKMSKeyEnableKeyRotation: 'Need to experiment further with the effets of rotating keys and EKS secrets'
            EIAMPolicyWildcardResource: 'this is the default kms policy as per https://docs.aws.amazon.com/kms/latest/developerguide/key-policies.html#key-policy-default'
    Properties:
      KeyPolicy: {
        "Version": "2012-10-17",
        "Id": "key-default-1",
        "Statement": [
          {
            "Sid": "Enable IAM User Permissions",
            "Effect": "Allow",
            "Principal": {
              "AWS": !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            },
            "Action": "kms:*",
            "Resource": "*"
          }
        ]
      }

  ControlPlaneRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: eks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKSClusterPolicy

  NodeInstanceRole:
    Condition: NoCustomNodeRoleProvided
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKS_CNI_Policy
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore

  ControlPlane:
    Type: "AWS::EKS::Cluster"
    Properties:
      Name: !Ref AWS::StackName
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
        BootstrapClusterCreatorAdminPermissions: false
      ResourcesVpcConfig:
        SecurityGroupIds: [ !Ref ControlPlaneSecurityGroup ]
        SubnetIds: !If
          - EnablePublicSubnets
          - !If
            - 3AZDeployment
            - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID, !Ref PrivateSubnet3ID, !Ref PublicSubnet1ID, !Ref PublicSubnet2ID, !Ref PublicSubnet3ID ]
            - !If
              - 2AZDeployment
              - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID, !Ref PublicSubnet1ID, !Ref PublicSubnet2ID ]
              - [ !Ref PrivateSubnet1ID, !Ref PublicSubnet1ID ]
          - !If
            - 3AZDeployment
            - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID, !Ref PrivateSubnet3ID ]
            - !If
              - 2AZDeployment
              - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID ]
              - [ !Ref PrivateSubnet1ID ]
        PublicAccessCidrs: !Ref EKSPublicAccessCIDRs
        EndpointPrivateAccess: !If [ EnablePrivateEndpoint, true, false ]
        EndpointPublicAccess: !If [ EnablePublicEndpoint, true, false ]
      Logging: !If
        - LoggingEnabled
        - ClusterLogging:
            EnabledTypes:
              - { Type: api }
              - { Type: audit }
              - { Type: authenticator }
              - { Type: controllerManager }
              - { Type: scheduler }
        - !Ref AWS::NoValue
      EncryptionConfig: !If
        - EnableEncryption
        - - Resources: [ secrets ]
            Provider:
              KeyArn: !If [ CreateKey, !GetAtt KMSKey.Arn, !Ref EKSEncryptSecretsKmsKeyArn ]
        - !Ref AWS::NoValue
      RoleArn: !GetAtt ControlPlaneRole.Arn
      Version: !Ref KubernetesVersion

  AdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !GetAtt KubernetesAdminRole.Arn
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }
  HelmAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/awsqs-kubernetes-helm"
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }
  RootAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }
  BastionAccessEntry:
    Condition: BastionRole
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${BastionRole}"
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }
  AdditionalAdminRoleAccessEntry:
    Condition: AddRole
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !Ref AdditionalEKSAdminRoleArn
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }
  AdditionalAdminUserAccessEntry:
    Condition: AddUser
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref ControlPlane
      PrincipalArn: !Ref AdditionalEKSAdminUserArn
      AccessPolicies:
        - PolicyArn: !Sub arn:${AWS::Partition}:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope: { Type: cluster }

  # Self-hosted replacements for the eks-quickstart-* helper Lambdas below.
  # Each is a small inline Python function (no layers, no external packages)
  # so this template no longer depends on the (retired) AWS Quick Start
  # per-account/per-region shared resources for these two operations.

  CustomResourceHelperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'
        - PolicyName: cleanup-load-balancers
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DeleteLoadBalancer
                Resource: '*'

  CleanupLoadBalancersFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt CustomResourceHelperRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib.request

          def send(event, context, status, data=None, physical_id=None, reason=None):
              # CloudFormation rejects custom resource responses over ~4096 bytes for
              # Reason - an unusually large exception message (e.g. from a busy shared
              # VPC with many load balancers) would otherwise fail the response PUT
              # itself with "Response object is too long", masking the real error.
              reason = (reason or "See CloudWatch Logs")[:900]
              body = json.dumps({
                  "Status": status,
                  "Reason": reason,
                  "PhysicalResourceId": physical_id or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

          # Deletes any ELB/ALB/NLB tagged elbv2.k8s.aws/cluster=<cluster-name> - these
          # are created by in-cluster Services/Ingress via the Load Balancer Controller
          # and would otherwise block VPC/security-group deletion on stack teardown.
          def handler(event, context):
              try:
                  if event["RequestType"] != "Delete":
                      send(event, context, "SUCCESS")
                      return
                  cluster_name = event["ResourceProperties"]["ClusterName"]
                  elbv2 = boto3.client("elbv2")
                  paginator = elbv2.get_paginator("describe_load_balancers")
                  for page in paginator.paginate():
                      for lb in page["LoadBalancers"]:
                          tags = elbv2.describe_tags(ResourceArns=[lb["LoadBalancerArn"]])
                          tag_map = {
                              t["Key"]: t["Value"]
                              for desc in tags["TagDescriptions"]
                              for t in desc["Tags"]
                          }
                          if tag_map.get("elbv2.k8s.aws/cluster") == cluster_name:
                              elbv2.delete_load_balancer(LoadBalancerArn=lb["LoadBalancerArn"])
                  send(event, context, "SUCCESS")
              except Exception as e:
                  send(event, context, "FAILED", reason=str(e))

  CleanupLoadBalancers:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt CleanupLoadBalancersFunction.Arn
      ClusterName: !Ref ControlPlane

  ClusterOIDCProvider:
    Condition: EnableIamOidcProvider
    Type: AWS::IAM::OIDCProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
      Url: !GetAtt ControlPlane.OpenIdConnectIssuerUrl

  #============================================================================#
  # Node Group
  #============================================================================#
  # Scoped to EKS-managed node groups only. The old "Unmanaged" self-managed-ASG path
  # (NodeGroupType: Unmanaged) is not implemented natively here - it would need its own
  # AutoScalingGroup + LaunchTemplate stack rather than AWS::EKS::Nodegroup.

  # Only set UserData when there's actually a kubelet flag to add - otherwise
  # omit it so EKS's own managed-nodegroup bootstrap handles everything.
  # Uses the AL2023 nodeadm NodeConfig format (not /etc/eks/bootstrap.sh,
  # which AL2023 AMIs don't ship - that only exists on the now EOL AL2 AMIs).
  # Weave CNI is not wired up here: it required a patched bootstrap.sh on a
  # custom AL2 AMI, which has no nodeadm equivalent and is not supported by
  # the default AmiType path.
  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !If [ CustomAmi, !Ref CustomAmiId, !Ref "AWS::NoValue" ]
        KeyName: !If [ UseKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue" ]
        # DiskSize can't be set on AWS::EKS::Nodegroup once a LaunchTemplate is
        # attached - EKS requires it here instead. /dev/xvda is correct for
        # AL2023/AL2/Bottlerocket AMIs; Bottlerocket actually has a separate
        # data volume this doesn't resize.
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref NodeVolumeSize
        UserData: !If
          - HasNodeBootstrapExtraArgs
          - !Base64
              Fn::Sub:
                - |
                  MIME-Version: 1.0
                  Content-Type: multipart/mixed; boundary="//"

                  --//
                  Content-Type: application/node.eks.aws

                  ---
                  apiVersion: node.eks.aws/v1alpha1
                  kind: NodeConfig
                  spec:
                    kubelet:
                      flags:
                        - "${ExtraArgs}"
                  --//--
                - ExtraArgs: !Ref NodeBootstrapExtraArgs
          - !Ref "AWS::NoValue"

  NodeGroup:
    Condition: CreateNodeGroup
    Type: AWS::EKS::Nodegroup
    DependsOn: ControlPlane
    Properties:
      ClusterName: !Ref ControlPlane
      NodegroupName: !Ref NodeGroupName
      NodeRole: !If
        - CustomeNodeRoleProvided
        - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${CustomNodeRole}"
        - !GetAtt NodeInstanceRole.Arn
      Subnets: !If
        - 3AZDeployment
        - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID, !Ref PrivateSubnet3ID ]
        - !If
          - 2AZDeployment
          - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID ]
          - [ !Ref PrivateSubnet1ID ]
      InstanceTypes: [ !Ref NodeInstanceType ]
      AmiType: !If
        - CustomAmi
        - CUSTOM
        - !If
          - WindowsOS
          - !FindInMap [ AmiTypeMap, !Ref NodeInstanceFamily, Windows ]
          - !If
            - BottlerocketOS
            - !FindInMap [ AmiTypeMap, !Ref NodeInstanceFamily, Bottlerocket ]
            - !FindInMap [ AmiTypeMap, !Ref NodeInstanceFamily, AmazonLinux2023 ]
      ScalingConfig:
        MinSize: 1
        MaxSize: !Ref MaxNumberOfNodes
        DesiredSize: !Ref NumberOfNodes
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Labels:
        Name: !Sub "Nodegroup-${AWS::StackName}"

  # Generic "sleep N seconds then succeed" custom resource, reused at two
  # points where a resource's own CREATE_COMPLETE doesn't mean what depends on
  # it next can safely proceed yet:
  #  - after NodeGroup: EKS ACTIVE doesn't mean a pod can already schedule,
  #    pull its image, and pass readiness on the new node
  #  - after LoadBalancerControllerHelmChart: "helm install" returning doesn't
  #    mean the controller pod (and its admission webhook) is actually ready -
  #    installing any other chart that creates a Service in that window fails
  #    with "no endpoints available for service aws-load-balancer-webhook-service"
  # See: https://github.com/kubernetes-sigs/aws-load-balancer-controller/issues/4140
  SettleWaitFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt CustomResourceHelperRole.Arn
      Timeout: 200
      Code:
        ZipFile: |
          import json
          import time
          import urllib.request

          def send(event, context, status, reason=None):
              reason = (reason or "See CloudWatch Logs")[:900]
              body = json.dumps({
                  "Status": status,
                  "Reason": reason,
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": {},
              }).encode("utf-8")
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  if event["RequestType"] != "Delete":
                      time.sleep(int(event["ResourceProperties"].get("Seconds", 60)))
                  send(event, context, "SUCCESS")
              except Exception as e:
                  send(event, context, "FAILED", reason=str(e))

  NodeGroupSettleWait:
    Condition: CreateNodeGroup
    DependsOn: NodeGroup
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SettleWaitFunction.Arn
      Seconds: 120

  # Required for the EKS-managed external-dns and aws-ebs-csi-driver add-ons
  # to authenticate to AWS via a PodIdentityAssociation instead of IRSA.
  PodIdentityAgentAddon:
    Condition: CreateNodeGroup
    DependsOn: NodeGroupSettleWait
    Type: AWS::EKS::Addon
    Properties:
      AddonName: eks-pod-identity-agent
      ClusterName: !Ref ControlPlane
      ResolveConflicts: OVERWRITE

  # The chart-applied StorageClasses (charts/network/templates/storage-class.yaml)
  # that use provisioner "ebs.csi.aws.com" need this addon to actually work -
  # the older in-tree "kubernetes.io/aws-ebs" provisioner was removed from
  # Kubernetes entirely as of 1.23, so CSI is the only option on any version
  # this template supports.
  EBSCSIDriverPodIdentityRole:
    Condition: CreateNodeGroup
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: pods.eks.amazonaws.com }
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy

  EBSCSIDriverPodIdentityAssociation:
    Condition: CreateNodeGroup
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Ref ControlPlane
      Namespace: kube-system
      ServiceAccount: ebs-csi-controller-sa
      RoleArn: !GetAtt EBSCSIDriverPodIdentityRole.Arn

  EBSCSIDriverAddon:
    Condition: CreateNodeGroup
    DependsOn: EBSCSIDriverPodIdentityAssociation
    Type: AWS::EKS::Addon
    Properties:
      AddonName: aws-ebs-csi-driver
      ClusterName: !Ref ControlPlane
      ResolveConflicts: OVERWRITE

  LoadBalancerControllerSettleWait:
    Condition: EnableLoadBalancerController
    DependsOn: LoadBalancerControllerHelmChart
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SettleWaitFunction.Arn
      Seconds: 60

  LoadBalancerControllerIAMRole:
    Condition: EnableLoadBalancerController
    Type: AWS::IAM::Role
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [EIAMPolicyWildcardResource]
          ignore_reasons:
            EIAMPolicyWildcardResource: "resources are created dynamically by the k8s cloud controller, and aren't known at the time of policy creation"
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/${OIDCIssuerURLWithoutProtocol}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OIDCIssuerURLWithoutProtocol}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller"
                  }
                }
              }
            ]
          }
        - OIDCIssuerURLWithoutProtocol: !Join [ '', !Split [ 'https://', !GetAtt ControlPlane.OpenIdConnectIssuerUrl ] ]
      Policies:
      - PolicyName: load-balancer-controller-policy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - 'iam:CreateServiceLinkedRole'
                - 'ec2:DescribeAccountAttributes'
                - 'ec2:DescribeAddresses'
                - 'ec2:DescribeAvailabilityZones'
                - 'ec2:DescribeInternetGateways'
                - 'ec2:DescribeVpcs'
                - 'ec2:DescribeSubnets'
                - 'ec2:DescribeSecurityGroups'
                - 'ec2:DescribeInstances'
                - 'ec2:DescribeNetworkInterfaces'
                - 'ec2:DescribeTags'
                - 'ec2:GetCoipPoolUsage'
                - 'ec2:DescribeCoipPools'
                - 'elasticloadbalancing:DescribeLoadBalancers'
                - 'elasticloadbalancing:DescribeLoadBalancerAttributes'
                - 'elasticloadbalancing:DescribeListeners'
                - 'elasticloadbalancing:DescribeListenerAttributes'
                - 'elasticloadbalancing:DescribeListenerCertificates'
                - 'elasticloadbalancing:DescribeSSLPolicies'
                - 'elasticloadbalancing:DescribeRules'
                - 'elasticloadbalancing:DescribeTargetGroups'
                - 'elasticloadbalancing:DescribeTargetGroupAttributes'
                - 'elasticloadbalancing:DescribeTargetHealth'
                - 'elasticloadbalancing:DescribeTags'
              Resource: '*'
            - Effect: Allow
              Action:
                - 'cognito-idp:DescribeUserPoolClient'
                - 'acm:ListCertificates'
                - 'acm:DescribeCertificate'
                - 'iam:ListServerCertificates'
                - 'iam:GetServerCertificate'
                - 'waf-regional:GetWebACL'
                - 'waf-regional:GetWebACLForResource'
                - 'waf-regional:AssociateWebACL'
                - 'waf-regional:DisassociateWebACL'
                - 'wafv2:GetWebACL'
                - 'wafv2:GetWebACLForResource'
                - 'wafv2:AssociateWebACL'
                - 'wafv2:DisassociateWebACL'
                - 'shield:GetSubscriptionState'
                - 'shield:DescribeProtection'
                - 'shield:CreateProtection'
                - 'shield:DeleteProtection'
              Resource: '*'
            - Effect: Allow
              Action:
                - 'ec2:AuthorizeSecurityGroupIngress'
                - 'ec2:RevokeSecurityGroupIngress'
              Resource: '*'
            - Effect: Allow
              Action:
                - 'ec2:CreateSecurityGroup'
              Resource: '*'
            - Effect: Allow
              Action:
                - 'ec2:CreateTags'
              Resource: !Sub 'arn:${AWS::Partition}:ec2:*:*:security-group/*'
              Condition:
                StringEquals:
                  'ec2:CreateAction': CreateSecurityGroup
                'Null':
                  'aws:RequestTag/elbv2.k8s.aws/cluster': 'false'
            - Effect: Allow
              Action:
                - 'ec2:CreateTags'
                - 'ec2:DeleteTags'
              Resource: !Sub 'arn:${AWS::Partition}:ec2:*:*:security-group/*'
              Condition:
                'Null':
                  'aws:RequestTag/elbv2.k8s.aws/cluster': 'true'
                  'aws:ResourceTag/elbv2.k8s.aws/cluster': 'false'
            - Effect: Allow
              Action:
                - 'ec2:AuthorizeSecurityGroupIngress'
                - 'ec2:RevokeSecurityGroupIngress'
                - 'ec2:DeleteSecurityGroup'
              Resource: '*'
              Condition:
                'Null':
                  'aws:ResourceTag/elbv2.k8s.aws/cluster': 'false'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:CreateLoadBalancer'
                - 'elasticloadbalancing:CreateTargetGroup'
              Resource: '*'
              Condition:
                'Null':
                  'aws:RequestTag/elbv2.k8s.aws/cluster': 'false'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:CreateListener'
                - 'elasticloadbalancing:DeleteListener'
                - 'elasticloadbalancing:CreateRule'
                - 'elasticloadbalancing:DeleteRule'
              Resource: '*'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:AddTags'
                - 'elasticloadbalancing:RemoveTags'
              Resource:
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:targetgroup/*/*'
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/net/*/*'
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/app/*/*'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:AddTags'
                - 'elasticloadbalancing:RemoveTags'
              Resource:
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:listener/net/*/*/*'
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:listener/app/*/*/*'
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:listener-rule/net/*/*/*'
                - !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:listener-rule/app/*/*/*'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:ModifyLoadBalancerAttributes'
                - 'elasticloadbalancing:SetIpAddressType'
                - 'elasticloadbalancing:SetSecurityGroups'
                - 'elasticloadbalancing:SetSubnets'
                - 'elasticloadbalancing:DeleteLoadBalancer'
                - 'elasticloadbalancing:ModifyTargetGroup'
                - 'elasticloadbalancing:ModifyTargetGroupAttributes'
                - 'elasticloadbalancing:DeleteTargetGroup'
              Resource: '*'
              Condition:
                'Null':
                  'aws:ResourceTag/elbv2.k8s.aws/cluster': 'false'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:RegisterTargets'
                - 'elasticloadbalancing:DeregisterTargets'
              Resource: !Sub 'arn:${AWS::Partition}:elasticloadbalancing:*:*:targetgroup/*/*'
            - Effect: Allow
              Action:
                - 'elasticloadbalancing:SetWebAcl'
                - 'elasticloadbalancing:ModifyListener'
                - 'elasticloadbalancing:AddListenerCertificates'
                - 'elasticloadbalancing:RemoveListenerCertificates'
                - 'elasticloadbalancing:ModifyRule'
              Resource: '*'

  LoadBalancerControllerHelmChart:
    Condition: EnableLoadBalancerController
    # Needs a running, settled node to schedule its pod onto before its own
    # admission webhook can become ready - without this, the Helm install can
    # start as soon as the cluster API is reachable, well before any node
    # exists or has had time to actually run a pod on it. Also needs
    # HelmAccessEntry to still exist on *delete* (helm uninstall re-auths to
    # the cluster) - without this dependency, CFN is free to tear down the
    # access entry before this resource's own delete handler runs, which
    # fails with a Kubernetes auth error ("the server has asked for the
    # client to provide credentials").
    DependsOn: [ NodeGroupSettleWait, HelmAccessEntry ]
    Type: "AWSQS::Kubernetes::Helm"
    Metadata: { cfn-lint: { config: { ignore_checks: [ E3012 ] } } }
    Properties:
      ClusterID: !Ref ControlPlane
      Namespace: kube-system
      Name: aws-load-balancer-controller
      Repository: https://aws.github.io/eks-charts
      Chart: eks/aws-load-balancer-controller
      # Chart version tracks the eks-charts repo; verify against
      # https://artifacthub.io/packages/helm/aws/aws-load-balancer-controller before deploying.
      Version: 1.14.0
      Values:
        clusterName: !Ref AWS::StackName
        region: !Sub '${AWS::Region}'
        vpcId: !Ref VPCID
      ValueYaml: !Sub |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: ${LoadBalancerControllerIAMRole.Arn}
        nodeSelector:
          kubernetes.io/os: linux
  
  #============================================================================#
  # Web Stack
  #============================================================================#
  # Note: the eks-quickstart-CleanupSecurityGroupDependencies workaround existed for
  # a historical Lambda-ENI-cleanup delay that blocked security group deletion. AWS's
  # Lambda networking (Hyperplane) has handled this reliably for years now, so this
  # resource (and GetVpcCidr, which was already unused dead code) have been dropped
  # rather than reimplemented.
  EKSLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        Security group for lambda to communicate with cluster API.
      VpcId: !Ref VPCID
  ClusterControlPlaneSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow lambda to communicate with the cluster API Server.
      GroupId: !Ref ControlPlaneSecurityGroup
      SourceSecurityGroupId: !Ref EKSLambdaSecurityGroup
      IpProtocol: tcp
      ToPort: 443
      FromPort: 443
  # kubectl/aws CLI no longer come from eks-quickstart-Kubectl/AwsCli layers - they
  # must be vendored directly into functions/packages/WebStack/lambda.zip instead.
  # See functions/source/WebStack/README.md for how to build that bundle.
  WebStackLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: lambda_function.lambda_handler
      MemorySize: 256
      Role: !GetAtt KubernetesAdminRole.Arn
      Runtime: python3.13
      Timeout: 900
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Sub '${KeyPrefix}functions/packages/WebStack/lambda.zip'
      Environment:
        Variables:
          KUBECONFIG: /tmp/.kube/config
      VpcConfig:
        # Private subnets only - Lambda ENIs never get a public IP, so an ENI
        # placed in a public subnet (routed via an Internet Gateway, not a NAT
        # gateway) has no outbound internet access at all. Mixing public
        # subnets in here caused intermittent ConnectTimeoutErrors reaching
        # the EKS API depending on which subnet the ENI happened to land in.
        SecurityGroupIds: [!Ref EKSLambdaSecurityGroup]
        SubnetIds: !If
          - 3AZDeployment
          - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID, !Ref PrivateSubnet3ID ]
          - !If
            - 2AZDeployment
            - [ !Ref PrivateSubnet1ID, !Ref PrivateSubnet2ID ]
            - [ !Ref PrivateSubnet1ID ]
  WebStack:
    Type: "AWS::CloudFormation::Stack"
    # Same reasoning as LoadBalancerControllerHelmChart: nginx-ingress/external-dns/
    # dashboard all need a node to schedule onto before their Helm installs can succeed.
    # PodIdentityAgentAddon must be running before external-dns's PodIdentityAssociation
    # can be created. HelmAccessEntry must outlive WebStack's nested Helm resources on
    # delete too - see the comment on LoadBalancerControllerHelmChart.
    DependsOn: [ WebStackLambda, LoadBalancerControllerSettleWait, PodIdentityAgentAddon, HelmAccessEntry ]
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack.yaml
      Parameters:
        ClusterName: !Ref ControlPlane
        ClusterZone: !Ref ClusterZone
        WebStackArn: !GetAtt WebStackLambda.Arn
        AdminEmail: !Ref AdminEmail
        ProvisionNginxIngress: !Ref 'ProvisionNginxIngress'
        ProvisionExternalDNS: !Ref 'ProvisionExternalDNS'
        ProvisionDashboard: !Ref 'ProvisionDashboard'
        ProvisionNetwork: !Ref 'ProvisionNetwork'

  DashboardStack:
    Condition: EnableDashboard
    DependsOn: WebStack
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-dashboard.template.yaml
      Parameters:
        ClusterName: !Ref ControlPlane
        ClusterZone: !Ref ClusterZone
        CloudClientId: !Ref CloudClientId
        CloudClientSecret: !Ref CloudClientSecret
        CloudScope: !Ref CloudScope
        CloudOIDCUrl: !Ref CloudOIDCUrl
        SessionSigningKey: !Ref SessionSigningKey

#============================================================================#
# Outputs
#============================================================================#

Outputs:
  EksArn:
    Value: !GetAtt ControlPlane.Arn
  CAData:
    Value: !GetAtt ControlPlane.CertificateAuthorityData
  EKSEndpoint:
    Value: !GetAtt ControlPlane.Endpoint
  OIDCIssuerURL:
    Value: !GetAtt ControlPlane.OpenIdConnectIssuerUrl
  ControlPlaneSecurityGroup:
    Value: !Ref ControlPlaneSecurityGroup
  SysOpsAdminRoleArn:
    Value: !GetAtt KubernetesAdminRole.Arn
  NumberOfNodes:
    Value: !Ref NumberOfNodes
    Description: Number of Nodes
  EKSClusterName:
    Value: !Ref ControlPlane
  WebStackArn:
    Value: !GetAtt WebStackLambda.Arn
  AccessToken: 
    Condition: EnableDashboard
    Value: !GetAtt WebStack.Outputs.AccessToken