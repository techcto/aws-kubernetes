AWSTemplateFormatVersion: "2010-09-09"
Description: Deploys Solodev Webstack for Kubernetes

Parameters:
  ClusterName:
    Type: String
    Default: ""
  WebStackArn:
    Type: String
    Default: ""
  AdminEmail:
    Type: String
    Default: ""
    Description: "What is your email address?"
  ProvisionNginxIngress:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Inginx Proxy"
  ProvisionExternalDNS:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable External DNS with Route 53"
  ProvisionDashboard:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Dashboard"
  ProvisionNetwork:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable Token"
  ClusterZone:
    Description: This is the DNS Zone that for a single cluster
    Type: String
    Default: ""
  ProvisionLoadBalancerController:
    Type: String
    AllowedValues: [ "Enabled", "Disabled" ]
    Default: "Enabled"
    Description: "Choose Enabled to enable the AWS Load Balancer Controller"
  VPCID:
    Type: String
    Default: ""
  OIDCIssuerURL:
    Type: String
    Default: ""
  SettleWaitFunctionArn:
    Type: String
    Default: ""

Conditions:
  EnableNginxIngress: !Equals [!Ref 'ProvisionNginxIngress', 'Enabled']
  EnableExternalDNS: !Equals [!Ref 'ProvisionExternalDNS', 'Enabled']
  EnableDashboard: !Equals [!Ref 'ProvisionDashboard', 'Enabled']
  EnableNetwork: !Equals [!Ref 'ProvisionNetwork', 'Enabled']
  EnableLoadBalancerController: !Equals [!Ref 'ProvisionLoadBalancerController', 'Enabled']

Resources:
  
  #============================================================================#
  # Web Stack
  #============================================================================#
  ExternalDNSStack:
    Condition: EnableExternalDNS
    Type: AWS::CloudFormation::Stack
    Properties: 
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-external-dns.template.yaml
      Parameters:
        ClusterName: !Ref ClusterName
  # nginx-ingress's Service provisions an AWS NLB via annotations that the LB
  # controller watches for - it must already be running first, or nginx-ingress
  # comes up with no external address.
  LoadBalancerControllerStack:
    Condition: EnableLoadBalancerController
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-load-balancer-controller.template.yaml
      Parameters:
        ClusterName: !Ref ClusterName
        VPCID: !Ref VPCID
        OIDCIssuerURL: !Ref OIDCIssuerURL
        SettleWaitFunctionArn: !Ref SettleWaitFunctionArn
        WebStackArn: !Ref WebStackArn
  NginxIngressStack:
    DependsOn: [ ExternalDNSStack, LoadBalancerControllerStack ]
    Condition: EnableNginxIngress
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-nginx-ingress.template.yaml
      Parameters:
        ClusterName: !Ref ClusterName
        WebStackArn: !Ref WebStackArn
  LetsEncryptStack:
    Condition: EnableNginxIngress
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-lets-encrypt.template.yaml
      Parameters:
        ClusterName: !Ref ClusterName
        AdminEmail: !Ref AdminEmail
        WebStackArn: !Ref WebStackArn
  NetworkStack:
    Condition: EnableNetwork
    DependsOn: LetsEncryptStack
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/solodev-kubernetes/cloudformation/webstack/webstack-network.template.yaml
      Parameters:
        ClusterName: !Ref ClusterName
        WebStackArn: !Ref WebStackArn

#============================================================================#
# Outputs
#============================================================================#

Outputs:
  AccessToken:
    Condition: EnableNetwork
    Value: !GetAtt NetworkStack.Outputs.AccessToken