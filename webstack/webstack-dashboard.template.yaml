AWSTemplateFormatVersion: "2010-09-09"

Description: "Deploys the techcto/kubernetes-ui Dashboard (with native Keycloak OIDC/SSO) into an existing kubernetes cluster"

Metadata:

  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "Dashboard"
        Parameters:
          - ClusterName
          - ClusterZone
          - Namespace
          - WebStackArn
      -
        Label:
          default: "Optional: SSO Configuration (Keycloak)"
        Parameters:
          - CloudOIDCUrl
          - CloudClientId
          - CloudClientSecret
          - CloudScope
          - SessionSigningKey

Parameters:

  ClusterName:
    Type: String

  WebStackArn:
    Type: String

  Namespace:
    Type: String
    Default: "kubernetes-dashboard"

  ClusterZone:
    Description: This is the DNS Zone that for a single cluster
    Type: String
    Default: ""

  CloudOIDCUrl:
    Type: String
    Description: "Cloud's own OIDC issuer URL, for SSO login into the Dashboard - not to be confused with the EKS cluster's own OIDC provider (used for IRSA), which is a different thing entirely"
    Default: ""

  CloudClientId:
    Type: String
    Description: "Cloud's Keycloak client id for this cluster"
    Default: ""

  CloudClientSecret:
    Type: String
    Description: "Cloud's Keycloak client secret for this cluster"
    Default: ""

  CloudScope:
    Type: String
    Default: "openid profile email"

  SessionSigningKey:
    Type: String
    Description: "Key used to sign/verify the SSO session token exchanged between the auth and api services. Must be set to a real random value for SSO to work - the dashboard will still deploy without it, but SSO login will not."
    Default: ""
    NoEcho: true

Conditions:

  HasSso: !Not [!Equals [!Ref CloudClientId, ""]]

Resources:

  Dashboard:
    Type: "Custom::Helm"
    Properties:
      ServiceToken: !Ref WebStackArn
      ClusterName: !Ref ClusterName
      Namespace: !Ref Namespace
      Repository: "http://solodev-kubernetes.s3-website-us-east-1.amazonaws.com/charts"
      Chart: kubernetes-dashboard
      Name: kubernetes-dashboard
      Version: 7.14.0
      ValueYaml: !If
        - HasSso
        - !Sub |
            app:
              ingress:
                enabled: true
                hosts:
                  - ${ClusterName}.${ClusterZone}
                ingressClassName: nginx
                issuer:
                  name: letsencrypt-prod
                  scope: cluster
              image:
                pullPolicy: Always
            auth:
              image:
                repository: spacemade/kubernetes-ui-auth
                tag: latest
              containers:
                args:
                  - --v=1
                  - --oidc-issuer-url=${CloudOIDCUrl}
                  - --oidc-client-id=${CloudClientId}
                  - --oidc-client-secret=${CloudClientSecret}
                  - --oidc-redirect-url=https://${ClusterName}.${ClusterZone}/api/v1/oidc/callback
                  - --oidc-scopes=${CloudScope}
                  - --session-signing-key=${SessionSigningKey}
            api:
              image:
                repository: spacemade/kubernetes-ui-api
                tag: latest
              containers:
                args:
                  - --v=1
                  - --session-signing-key=${SessionSigningKey}
            web:
              image:
                repository: spacemade/kubernetes-ui-web
                tag: latest
        - !Sub |
            app:
              ingress:
                enabled: true
                hosts:
                  - ${ClusterName}.${ClusterZone}
                ingressClassName: nginx
                issuer:
                  name: letsencrypt-prod
                  scope: cluster
              image:
                pullPolicy: Always
            auth:
              image:
                repository: spacemade/kubernetes-ui-auth
                tag: latest
              containers:
                args:
                  - --v=1
            api:
              image:
                repository: spacemade/kubernetes-ui-api
                tag: latest
              containers:
                args:
                  - --v=1
            web:
              image:
                repository: spacemade/kubernetes-ui-web
                tag: latest

Outputs:

  AdminUrl:
    Description: Point your DNS to this CNAME.
    Value: !Join ["", [!Ref ClusterName, ".", !Ref ClusterZone]]
