AWSTemplateFormatVersion: "2010-09-09"

Description: "Enables the cert-manager EKS add-on and deploys the Let's Encrypt ClusterIssuer chart into an existing kubernetes cluster"

Metadata: 

  AWS::CloudFormation::Interface: 
    ParameterGroups: 
      - 
        Label:
          default: "Config"
        Parameters:
          - ClusterName
          - LetsEncryptRepoUrl
          - AdminEmail
          - WebStackArn

Parameters:

  ClusterName:
    Type: String

  LetsEncryptRepoUrl:
    Type: String
    Default: "http://solodev-kubernetes.s3-website-us-east-1.amazonaws.com/charts"

  AdminEmail:
    Type: String

  WebStackArn:
    Type: String

Resources:

  # AWS-managed add-on - handles CRDs itself and stays on a current, EKS-tested
  # version (v1.20.2 vs. the 1.7.2 the Helm chart was pinned to). No pod
  # identity/IRSA needed - Let's Encrypt is issued via HTTP01 through the
  # ingress, not a Route53 DNS01 solver.
  CertManager:
    Type: AWS::EKS::Addon
    Properties:
      AddonName: cert-manager
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE
      ConfigurationValues: |
        {
          "webhook": {
            "securePort": 10251,
            "hostNetwork": true
          }
        }

  LetsEncrypt:
    DependsOn: CertManager
    Type: "Custom::Helm"
    Properties:
      ServiceToken: !Ref WebStackArn
      ClusterName: !Ref ClusterName
      Repository: !Ref LetsEncryptRepoUrl
      Chart: lets-encrypt
      Version: '1.3'
      Name: lets-encrypt
      Namespace: cert-manager
      ValueYaml: !Sub |
        ssl:
          email: ${AdminEmail}

