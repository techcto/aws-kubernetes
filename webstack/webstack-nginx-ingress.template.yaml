AWSTemplateFormatVersion: "2010-09-09"

Description: "Deploys the Nginx Ingress helm chart into an existing kubernetes cluster (qs-1qde66ffn)"

Metadata: 

  AWS::CloudFormation::Interface: 
    ParameterGroups: 
      - 
        Label:
          default: "Lambda Function"
        Parameters:
          - ClusterName
          - WebStackArn

Parameters:

  ClusterName:
    Type: String

  WebStackArn:
    Type: String

Resources:

  NginxIngress:
    Type: "Custom::Helm"
    Properties:
      ServiceToken: !Ref WebStackArn
      ClusterName: !Ref ClusterName
      Namespace: ingress-nginx
      Repository: https://kubernetes.github.io/ingress-nginx
      Chart: ingress-nginx
      # Verify against https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
      # before bumping - unlike the Bitnami charts, images here come from
      # registry.k8s.io, which hasn't had a similar hosting disruption, but an
      # unpinned chart still means an uncontrolled version drift on every deploy.
      Version: '4.15.1'
      Name: ingress-nginx
      ValueYaml: !Sub |
        controller:
          name: controller
          # controller-role.yaml compares this against the literal string
          # "false" with Sprig's `ne` - when the key is absent entirely,
          # `index` returns nil and that comparison fails with "incompatible
          # types for comparison" instead of just being falsy.
          extraArgs:
            update-status: "false"
          service:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: external
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
              service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
          publishService:
            enabled: true
          stats:
            enabled: true
          metrics:
            enabled: true